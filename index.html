async function hashPhrase(p) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(p.toLowerCase().trim()));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

const DS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const DF=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];

function dayIdx() { const d=new Date().getDay(); return d===0?6:d-1; }
function weekDates() {
  const now=new Date(), d=now.getDay();
  const mon=new Date(now); mon.setDate(now.getDate()-(d===0?6:d-1));
  return Array.from({length:7},(_,i)=>{ const x=new Date(mon); x.setDate(mon.getDate()+i); return x; });
}

function parseIcal(text, target) {
  const results = [];
  const tStr = target.getFullYear().toString() + String(target.getMonth()+1).padStart(2,"0") + String(target.getDate()).padStart(2,"0");
  const blocks = text.split("BEGIN:VEVENT");
  for (let i=1; i<blocks.length; i++) {
    try {
      const b = blocks[i];
      const getVal = key => { const m=b.match(new RegExp(key+"[^:]*:([^\r\n]+)")); return m?m[1].trim():""; };
      const dt = getVal("DTSTART");
      const title = getVal("SUMMARY");
      if (!dt || !title) continue;
      let eDateStr, timeStr="All day", sort=0;
      if (dt.indexOf("T") !== -1) {
        const yr=dt.substr(0,4), mo=dt.substr(4,2), dy=dt.substr(6,2);
        const hr=dt.substr(9,2), mn=dt.substr(11,2);
        const isZ = dt.charAt(dt.length-1)==="Z";
        const d = new Date(yr+"-"+mo+"-"+dy+"T"+hr+":"+mn+":00"+(isZ?"Z":""));
        const fmt = new Intl.DateTimeFormat("en-CA",{timeZone:"America/Toronto",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false});
        const parts = {};
        fmt.formatToParts(d).forEach(p=>{ parts[p.type]=p.value; });
        eDateStr = parts.year + parts.month + parts.day;
        let lh = parseInt(parts.hour); if(lh===24||isNaN(lh)) lh=0;
        const lm = parseInt(parts.minute)||0;
        const ap = lh>=12?"PM":"AM";
        const h12 = lh>12?lh-12:lh===0?12:lh;
        timeStr = h12+":"+(lm<10?"0":"")+lm+" "+ap;
        sort = lh*60+lm;
      } else {
        eDateStr = dt.replace(/-/g,"").substr(0,8);
      }
      if (eDateStr !== tStr) continue;
      results.push({id:"gcal-"+Date.now()+"-"+i, time:timeStr, title:title, who:"Family", _sort:sort, _gcal:true});
    } catch(e) { continue; }
  }
  return results;
}

function Card({children,style={}}) {
  return React.createElement("div",{style:{background:P.card,borderRadius:16,border:"1px solid "+P.border,padding:"16px 18px",marginBottom:12,...style}},children);
}
function ST({color,children,right}) {
  return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
    React.createElement("div",{style:{display:"flex",alignItems:"center",fontWeight:500,fontSize:14,color:P.text}},
      React.createElement("span",{style:{width:8,height:8,borderRadius:"50%",background:color||P.dot,marginRight:8,display:"inline-block",flexShrink:0}}),
      children
    ),
    right||null
  );
}

function Weather() {
  const [wx,setWx] = useState(null);
  useEffect(()=>{
    fetch("https://api.open-meteo.com/v1/forecast?latitude=43.6679&longitude=-79.3163&hourly=temperature_2m,weathercode&timezone=America%2FToronto&forecast_days=1")
      .then(r=>r.json()).then(d=>{
        const h=d.hourly, code=h.weathercode[12];
        const icon=code<=1?"☀️":code<=3?"⛅":code<=48?"🌫️":code<=67?"🌧️":code<=77?"❄️":code<=82?"🌦️":"⛈️";
        setWx({m:Math.round(h.temperature_2m[9]),a:Math.round(h.temperature_2m[14]),icon});
      }).catch(()=>setWx({m:"—",a:"—",icon:"🌤️"}));
  },[]);
  if(!wx) return React.createElement("div",{style:{height:36}});
  return React.createElement("div",{style:{display:"flex",gap:8,marginTop:10}},
    [["Morning",wx.m],["Afternoon",wx.a]].map(([l,t])=>
      React.createElement("div",{key:l,style:{background:P.card,border:"1px solid "+P.border,borderRadius:20,padding:"5px 13px",fontSize:12,color:P.text,display:"flex",alignItems:"center",gap:5}},
        React.createElement("span",null,wx.icon),
        React.createElement("span",{style:{color:P.muted}},l),
        React.createElement("span",{style:{fontWeight:500}},t+"°C")
      )
    )
  );
}

function Login({onLogin}) {
  const [phrase,setPhrase]=useState(""), [setup,setSetup]=useState(false);
  const [confirm,setConfirm]=useState(""), [err,setErr]=useState(""), [busy,setBusy]=useState(false);
  useEffect(()=>{ try{setSetup(!!localStorage.getItem(PK));}catch(e){} },[]);
  const inp = {width:"100%",padding:"12px 14px",borderRadius:12,border:"1px solid "+P.border,fontSize:16,background:"#FAFAF8",color:P.text,boxSizing:"border-box",outline:"none",fontFamily:"Georgia,serif",marginBottom:12};
  const go = async()=>{
    if(!phrase.trim())return;
    setBusy(true); setErr("");
    const h=await hashPhrase(phrase);
    try {
      if(setup) { if(h===localStorage.getItem(PK)){localStorage.setItem(AK,h);onLogin();}else setErr("Incorrect passphrase."); }
      else {
        if(phrase!==confirm){setErr("Passphrases don't match.");setBusy(false);return;}
        if(phrase.length<6){setErr("Use at least 6 characters.");setBusy(false);return;}
        localStorage.setItem(PK,h); localStorage.setItem(AK,h); onLogin();
      }
    } catch(e){setErr("Something went wrong.");}
    setBusy(false);
  };
  return (
    <div style={{background:P.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:360}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:40,marginBottom:10}}>🏠</div>
          <h1 style={{margin:0,fontSize:22,fontWeight:500,color:P.text}}>Ellis HQ</h1>
          <p style={{margin:"6px 0 0",fontSize:13,color:P.muted}}>{setup?"Enter your household passphrase":"Set up your household passphrase"}</p>
        </div>
        <Card>
          {!setup&&<p style={{fontSize:13,color:P.muted,margin:"0 0 14px",lineHeight:1.6}}>Choose a passphrase for Mara, Brooke & Myles.</p>}
          <label style={{fontSize:11,color:P.muted,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>Passphrase</label>
          <input type="password" value={phrase} onChange={e=>setPhrase(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder={setup?"Enter passphrase…":"Choose a passphrase…"} style={inp} autoFocus/>
          {!setup&&<>
            <label style={{fontSize:11,color:P.muted,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>Confirm</label>
            <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Confirm…" style={inp}/>
          </>}
          {err&&<p style={{fontSize:13,color:"#C0392B",margin:"0 0 10px"}}>{err}</p>}
          <button onClick={go} disabled={busy} style={{width:"100%",padding:13,borderRadius:12,border:"none",background:P.mara.fg,color:"#fff",fontSize:16,fontWeight:500,cursor:"pointer",opacity:busy?.7:1}}>
            {busy?"Checking…":setup?"Unlock":"Set passphrase & enter"}
          </button>
        </Card>
      </div>
    </div>
  );
}

  const getTimeline = di => {

    return [...filtered,...ex,...gc].sort((a,b)=>{
      const s=e=>{ if(e._sort!==undefined)return e._sort; const m=(e.time||"").match(/(\d+):(\d+)\s*(AM|PM)?/i); if(!m)return 9999; let h=parseInt(m[1]),mn=parseInt(m[2]); const ap=(m[3]||"").toUpperCase(); if(ap==="PM"&&h!==12)h+=12; if(ap==="AM"&&h===12)h=0; return h*60+mn; };
      return s(a)-s(b);
    });
  };

  const addEv = ()=>{
    if(!newEv.title.trim()||!newEv.time)return;
    const [h,m]=newEv.time.split(":");
    const hr=parseInt(h), ap=hr>=12?"PM":"AM", h12=hr>12?hr-12:hr===0?12:hr;
    const ev={id:"ex-"+Date.now(),time:h12+":"+(m||"00")+" "+ap,title:newEv.title,who:newEv.who,_sort:hr*60+parseInt(m||0)};
    setExtras(p=>({...p,[selDay]:[...(p[selDay]||[]),ev]}));

  };
  const rmEv = ev=>{ if(typeof ev._bi==="number"){setRemoved(p=>({...p,[selDay]:[...(p[selDay]||[]),ev._bi]}));}else{setExtras(p=>({...p,[selDay]:(p[selDay]||[]).filter(e=>e.id!==ev.id)}));} };
  const addNote=()=>{ if(!newNote.trim())return; const ts=new Date().toLocaleString("en-CA",{weekday:"short",hour:"numeric",minute:"2-digit"}); setNotes(n=>[{id:Date.now(),from:user,text:newNote,ts},...n]); setNewNote(""); };

  const changePw=async()=>{
    if(np.length<6){setPwMsg("Use at least 6 characters.");return;}

    catch(e){setPwMsg("Something went wrong.");}
  };
  const lock=()=>{ try{localStorage.removeItem(AK);}catch(e){} onLock(); };
  const ml=()=>{ const s=WD[0],e=WD[6]; const sm=MN[s.getMonth()],em=MN[e.getMonth()]; return sm===em?sm+" "+s.getDate()+"–"+e.getDate():sm+" "+s.getDate()+" – "+em+" "+e.getDate(); };

  const tl = getTimeline(selDay);
  const todoT=tasks.filter(t=>!t.done), doneT=tasks.filter(t=>t.done);
  const todoG=grocery.filter(g=>!g.done), doneG=grocery.filter(g=>g.done);
  const pNotes=notes.filter(n=>n.from!=="Mara").slice(0,3);
  const TABS=[{k:"schedule",label:"Schedule"},{k:"errands",label:"Errands"},{k:"grocery",label:"Grocery"},{k:"gcal",label:"Calendar"}];

            <ST color={uc.fg} right={<span style={{fontSize:11,color:P.muted}}>{MN[WD[selDay].getMonth()]} {WD[selDay].getDate()}</span>}>
              Today's Timeline — {DF[selDay]}
            </ST>
            {gcalLoading&&<p style={{fontSize:11,color:P.muted,fontStyle:"italic",marginBottom:6}}>Syncing calendar…</p>}
            {gcalErr&&<p style={{fontSize:11,color:"#C0392B",marginBottom:6}}>{gcalErr}</p>}
            {isWknd(selDay)&&tl.length===0&&<p style={{fontSize:13,color:P.muted,fontStyle:"italic",marginBottom:10}}>Weekend — no routine scheduled.</p>}
            <div style={{position:"relative",paddingLeft:16}}>
              {tl.length>0&&<div style={{position:"absolute",left:3,top:8,bottom:8,width:2,background:P.border,borderRadius:2}}/>}
              {tl.map((item,i)=>{ const c=wc(item.who); return(
                <div key={item.id||i} style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:8,position:"relative"}}>
                  <div style={{position:"absolute",left:-13,top:6,width:8,height:8,borderRadius:"50%",background:c.fg,border:"2px solid "+P.bg,zIndex:1}}/>
                  <div style={{flex:1,background:c.bg,borderRadius:8,padding:"7px 11px",borderLeft:"2px solid "+c.fg}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
                      <span style={{fontSize:13,color:P.text}}>{item.title}{item._gcal&&<span style={{fontSize:10,color:c.fg,marginLeft:5}}>●</span>}</span>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        <span style={{fontSize:10,color:c.fg,background:"white",padding:"1px 7px",borderRadius:20,border:"1px solid "+c.fg}}>{item.who}</span>
                        <span style={{fontSize:10,color:P.muted}}>{item.time}</span>
                        <button onClick={()=>rmEv(item)} style={{background:"none",border:"none",color:P.muted,cursor:"pointer",fontSize:14,lineHeight:1,padding:"0 2px"}}>×</button>
                      </div>
                    </div>
                  </div>
                </div>
              );})}
            </div>
            {!showAdd
              ?<button onClick={()=>setShowAdd(true)} style={{...btn(false),marginTop:4,fontSize:12,padding:"7px 13px"}}>+ Add event</button>
              :<div style={{marginTop:10,padding:12,background:"#FAFAF8",borderRadius:10,border:"1px solid "+P.border}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:8}}>
                  <input type="time" value={newEv.time} onChange={e=>setNewEv(v=>({...v,time:e.target.value}))} style={inp}/>
                  <select value={newEv.who} onChange={e=>setNewEv(v=>({...v,who:e.target.value}))} style={inp}>
                    {["Mara","Brooke","Myles","Family"].map(w=><option key={w}>{w}</option>)}
                  </select>
                </div>
                <input placeholder="Event title…" value={newEv.title} onChange={e=>setNewEv(v=>({...v,title:e.target.value}))} style={{...inp,marginBottom:8}}/>
                <div style={{display:"flex",gap:7}}><button onClick={addEv} style={btn(true)}>Add</button><button onClick={()=>setShowAdd(false)} style={btn(false)}>Cancel</button></div>
              </div>
            }
          </Card>
        </>}

        {tab==="errands"&&<>
          <Card>
            <ST color={uc.fg}>Errands</ST>
            {todoT.length===0&&<div style={{fontSize:13,color:P.muted,fontStyle:"italic",marginBottom:12}}>All done! 🎉</div>}
            {todoT.map(t=>(
              <div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"9px 0",borderBottom:"1px solid "+P.border}}>
                <input type="checkbox" checked={false} onChange={()=>setTasks(ts=>ts.map(x=>x.id===t.id?{...x,done:true}:x))} style={{marginTop:3,accentColor:uc.fg,width:18,height:18,cursor:"pointer"}}/>
                <div style={{flex:1}}><div style={{fontSize:14,color:P.text}}>{t.text}</div><div style={{fontSize:11,color:P.muted,marginTop:2}}>For: <strong>{t.by}</strong> · Added by {t.added}</div></div>
                <button onClick={()=>setTasks(ts=>ts.filter(x=>x.id!==t.id))} style={{background:"none",border:"none",color:P.muted,cursor:"pointer",fontSize:16,padding:"0 2px"}}>×</button>
              </div>
            ))}
            <div style={{marginTop:14,display:"flex",gap:7}}>
              <input placeholder="New errand…" value={newTask} onChange={e=>setNewTask(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()} style={{...inp,flex:1}}/>
              <select value={taskBy} onChange={e=>setTaskBy(e.target.value)} style={{...inp,width:"auto"}}>{["Mara","Anyone","Myles","Brooke"].map(w=><option key={w}>{w}</option>)}</select>
              <button onClick={addTask} style={btn(true)}>Add</button>
            </div>
          </Card>
          {doneT.length>0&&<Card style={{opacity:.75}}>
            <ST color={P.muted}>Done</ST>
            {doneT.map(t=>(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid "+P.border}}>
                <input type="checkbox" checked onChange={()=>setTasks(ts=>ts.map(x=>x.id===t.id?{...x,done:false}:x))} style={{accentColor:uc.fg,width:18,height:18,cursor:"pointer"}}/>
                <span style={{fontSize:13,color:P.muted,textDecoration:"line-through",flex:1}}>{t.text}</span>
                <button onClick={()=>setTasks(ts=>ts.filter(x=>x.id!==t.id))} style={{background:"none",border:"none",color:P.muted,cursor:"pointer",fontSize:16,padding:"0 2px"}}>×</button>
              </div>
            ))}
          </Card>}
          <Card>
            <ST color={uc.fg}>Leave a note</ST>
            <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="Let the family know anything…" rows={3} style={{...inp,resize:"none",lineHeight:1.6,marginBottom:8}}/>
            <button onClick={addNote} style={btn(true)}>Post as {user}</button>
          </Card>
        </>}

        {tab==="grocery"&&<Card>
          <ST color={uc.fg}>Grocery List</ST>
          {todoG.length===0&&<p style={{fontSize:13,color:P.muted,fontStyle:"italic",marginBottom:12}}>List is empty!</p>}
          {todoG.map(g=>(
            <div key={g.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid "+P.border}}>
              <input type="checkbox" checked={false} onChange={()=>setGrocery(gs=>gs.map(x=>x.id===g.id?{...x,done:true}:x))} style={{accentColor:uc.fg,width:18,height:18,cursor:"pointer"}}/>
              <span style={{fontSize:14,color:P.text,flex:1}}>{g.text}</span>
              <span style={{fontSize:11,color:P.muted}}>{g.added}</span>
              <button onClick={()=>setGrocery(gs=>gs.filter(x=>x.id!==g.id))} style={{background:"none",border:"none",color:P.muted,cursor:"pointer",fontSize:16,padding:"0 2px"}}>×</button>
            </div>
          ))}
          <div style={{marginTop:12,display:"flex",gap:7}}>
            <input placeholder="Add item…" value={newGroc} onChange={e=>setNewGroc(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addGroc()} style={{...inp,flex:1}}/>
            <select value={grocBy} onChange={e=>setGrocBy(e.target.value)} style={{...inp,width:"auto"}}>{["Brooke","Myles","Mara"].map(w=><option key={w}>{w}</option>)}</select>
            <button onClick={addGroc} style={btn(true)}>Add</button>
          </div>
          {doneG.length>0&&<div style={{marginTop:14}}>
            <div style={{fontSize:11,color:P.muted,textTransform:"uppercase",letterSpacing:.4,marginBottom:7}}>In cart</div>
            {doneG.map(g=>(
              <div key={g.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid "+P.border,opacity:.65}}>
                <input type="checkbox" checked onChange={()=>setGrocery(gs=>gs.map(x=>x.id===g.id?{...x,done:false}:x))} style={{accentColor:uc.fg,width:18,height:18,cursor:"pointer"}}/>
                <span style={{fontSize:13,color:P.muted,textDecoration:"line-through",flex:1}}>{g.text}</span>
                <button onClick={()=>setGrocery(gs=>gs.filter(x=>x.id!==g.id))} style={{background:"none",border:"none",color:P.muted,cursor:"pointer",fontSize:16,padding:"0 2px"}}>×</button>
              </div>
            ))}
          </div>}
        </Card>}

        {tab==="gcal"&&<Card>
          <ST color={uc.fg}>Family Calendar</ST>
          <p style={{fontSize:12,color:P.muted,margin:"0 0 12px",lineHeight:1.5}}>Connect Google Calendar: Settings → your calendar → Integrate calendar → copy the embed URL.</p>
          {gcalUrl
            ?<><iframe src={gcalUrl} style={{width:"100%",height:480,border:"none",borderRadius:10}} title="Family Calendar"/><button onClick={()=>{setShowGcalEdit(true);setGcalIn(gcalUrl);}} style={{...btn(false),marginTop:8,fontSize:12,padding:"7px 13px"}}>Change URL</button></>
            :<div style={{textAlign:"center",padding:"32px 0"}}><div style={{fontSize:36,marginBottom:10}}>📅</div><p style={{fontSize:13,color:P.muted,marginBottom:14}}>No calendar connected yet.</p><button onClick={()=>setShowGcalEdit(true)} style={btn(true)}>Connect Google Calendar</button></div>
          }
          {showGcalEdit&&<div style={{marginTop:12,padding:12,background:"#FAFAF8",borderRadius:10,border:"1px solid "+P.border}}>
            <input value={gcalIn} onChange={e=>setGcalIn(e.target.value)} placeholder="https://calendar.google.com/calendar/embed?src=…" style={{...inp,marginBottom:9}}/>
            <div style={{display:"flex",gap:7}}>
              <button onClick={()=>{try{localStorage.setItem(GK,gcalIn);}catch(e){}setGcalUrl(gcalIn);setShowGcalEdit(false);}} style={btn(true)}>Save</button>
              <button onClick={()=>setShowGcalEdit(false)} style={btn(false)}>Cancel</button>
            </div>
          </div>}
        </Card>}

      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(247,244,239,0.96)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",borderTop:"1px solid "+P.border,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        {TABS.map(({k,label})=>{ const active=tab===k; return(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 4px 8px",background:"none",border:"none",cursor:"pointer",gap:2}}>
            {k==="schedule"
              ?<div style={{width:24,height:24,borderRadius:5,border:"1.5px solid "+(active?uc.fg:P.muted),display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
                <div style={{width:"100%",height:7,background:active?uc.fg:P.muted,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:5,color:"white",fontWeight:700,lineHeight:1}}>●●</span></div>
                <span style={{fontSize:10,fontWeight:700,color:active?uc.fg:P.muted,lineHeight:1.2}}>{todayDate}</span>
              </div>
              :k==="errands"?<span style={{fontSize:22,lineHeight:1}}>✓</span>
              :k==="grocery"?<span style={{fontSize:20,lineHeight:1}}>🛒</span>
              :<span style={{fontSize:20,lineHeight:1}}>🗓</span>
            }
            <span style={{fontSize:10,color:active?uc.fg:P.muted,fontWeight:active?500:400}}>{label}</span>
            {active&&<div style={{width:4,height:4,borderRadius:"50%",background:uc.fg}}/>}
          </button>
        );})}
      </div>
    </div>
  );
}

function App() {
  const [authed,setAuthed]=useState(false), [checking,setChecking]=useState(true);
  useEffect(()=>{
    try{ const s=localStorage.getItem(PK),a=localStorage.getItem(AK); if(s&&a&&a===s)setAuthed(true); }catch(e){}
    setChecking(false);
  },[]);
  if(checking) return React.createElement("div",{style:{background:P.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},React.createElement("span",{style:{color:P.muted,fontSize:14}},"Loading…"));
  if(!authed) return React.createElement(Login,{onLogin:()=>setAuthed(true)});
  return React.createElement(Dashboard,{onLock:()=>setAuthed(false)});
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
